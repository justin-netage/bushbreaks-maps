name: Attach release zip

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          set -euo pipefail
          STAGING="$RUNNER_TEMP/bushbreaks-maps"
          mkdir -p "$STAGING"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.editorconfig' \
            --exclude='tests' \
            --exclude='bushbreaks-maps.zip' \
            ./ "$STAGING/"
          cd "$RUNNER_TEMP"
          zip -rq bushbreaks-maps.zip bushbreaks-maps

      - name: Attach zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "$RUNNER_TEMP/bushbreaks-maps.zip" \
            --clobber \
            --repo "${{ github.repository }}"
